<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wedding Camera Overlay</title>

  <style>
    :root {
      --bg: #0f0f10;
      --panel: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);
      --radius: 18px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto auto auto auto;
      gap: 14px;
      padding: 14px 14px calc(14px + var(--safe-bottom));
      max-width: 480px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 4px 2px 0;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .subtitle {
      font-size: 0.92rem;
      color: var(--muted);
    }

    .camera-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow);
    }

    .video,
    .overlay-stage,
    .overlay-image,
    .capture-flash {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .video {
      object-fit: contain;
      background: #000;
      transform-origin: center center;
      display: block;
    }

    .video.mirror {
      transform: scaleX(-1);
    }

    .overlay-stage {
      pointer-events: none;
      overflow: hidden;
    }

    .overlay-image {
      object-fit: contain;
      pointer-events: none;
      user-select: none;
      transform-origin: center center;
      will-change: transform;
      display: block;
    }

    .capture-flash {
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
      z-index: 4;
    }

    .capture-flash.active {
      opacity: 0.85;
    }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 5;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
      font-size: 0.85rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      padding-top: 4px;
    }

    .left-actions,
    .right-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .right-actions {
      justify-content: flex-end;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .capture-btn {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      padding: 0;
      background: #fff;
      position: relative;
      box-shadow: var(--shadow);
    }

    .capture-btn::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 3px solid #111;
    }

    .secondary {
      min-width: 110px;
    }

    .adjust-panel {
      display: grid;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
    }

    .adjust-row {
      display: grid;
      grid-template-columns: 92px 1fr 58px;
      gap: 10px;
      align-items: center;
    }

    .adjust-row label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .adjust-row input[type="range"] {
      width: 100%;
    }

    .adjust-value {
      font-size: 0.88rem;
      text-align: right;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .adjust-actions,
    .result-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .result {
      display: none;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: var(--radius);
    }

    .result.show {
      display: flex;
    }

    .result img {
      width: 100%;
      aspect-ratio: 9 / 16;
      object-fit: contain;
      border-radius: 16px;
      display: block;
      background: #111;
    }

    .hint {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.4;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div class="title">Foto do Casamento</div>
      <div class="subtitle">Foto final em 1080 x 1920, sem zoom na câmera</div>
    </header>

    <section class="camera-shell">
      <div class="badge" id="statusBadge">Câmera desligada</div>

      <video
        id="video"
        class="video"
        autoplay
        muted
        playsinline
      ></video>

      <div class="overlay-stage">
        <img
          id="overlay"
          class="overlay-image"
          src="./filtro.png"
          alt="Template do casamento"
        />
      </div>

      <div id="flash" class="capture-flash"></div>
    </section>

    <section class="controls">
      <div class="left-actions">
        <button id="switchBtn" class="secondary" type="button">Trocar câmera</button>
      </div>

      <button id="captureBtn" class="capture-btn" aria-label="Capturar foto"></button>

      <div class="right-actions"></div>
    </section>

    <section class="adjust-panel">
      <div class="adjust-row">
        <label for="scaleRange">Zoom filtro</label>
        <input id="scaleRange" type="range" min="70" max="140" step="1" value="100" />
        <div id="scaleValue" class="adjust-value">100%</div>
      </div>

      <div class="adjust-row">
        <label for="offsetXRange">Horizontal</label>
        <input id="offsetXRange" type="range" min="-30" max="30" step="0.5" value="0" />
        <div id="offsetXValue" class="adjust-value">0.0%</div>
      </div>

      <div class="adjust-row">
        <label for="offsetYRange">Vertical</label>
        <input id="offsetYRange" type="range" min="-30" max="30" step="0.5" value="0" />
        <div id="offsetYValue" class="adjust-value">0.0%</div>
      </div>

      <div class="adjust-actions">
        <button id="resetAdjustBtn" type="button">Resetar filtro</button>
      </div>
    </section>

    <section id="result" class="result">
      <img id="resultImage" alt="Foto capturada com filtro" />

      <div class="result-actions">
        <button id="retakeBtn" class="secondary" type="button">Tirar outra</button>
        <button id="saveBtn" class="secondary" disabled>Baixar</button>
      </div>

      <div class="hint">
        A foto final é exportada em 1080 x 1920. Como a câmera está sem zoom, podem aparecer bordas pretas dependendo da proporção nativa do aparelho.
      </div>
    </section>

    <canvas id="canvas"></canvas>
  </main>

  <script>
    const CONFIG = {
      templateUrl: "./filtro.png",
      preferredFacingMode: "user",
      mirrorFrontCameraPreview: true,
      mirrorFrontCameraCapture: true,
      outputMimeType: "image/jpeg",
      outputQuality: 0.95,
      fileNamePrefix: "casamento",
      outputWidth: 1080,
      outputHeight: 1920
    };

    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const switchBtn = document.getElementById("switchBtn");
    const captureBtn = document.getElementById("captureBtn");
    const saveBtn = document.getElementById("saveBtn");
    const retakeBtn = document.getElementById("retakeBtn");

    const result = document.getElementById("result");
    const resultImage = document.getElementById("resultImage");
    const statusBadge = document.getElementById("statusBadge");
    const flash = document.getElementById("flash");

    const scaleRange = document.getElementById("scaleRange");
    const offsetXRange = document.getElementById("offsetXRange");
    const offsetYRange = document.getElementById("offsetYRange");

    const scaleValue = document.getElementById("scaleValue");
    const offsetXValue = document.getElementById("offsetXValue");
    const offsetYValue = document.getElementById("offsetYValue");
    const resetAdjustBtn = document.getElementById("resetAdjustBtn");

    let stream = null;
    let currentFacingMode = CONFIG.preferredFacingMode;
    let lastBlobUrl = null;

    const overlayState = {
      scale: 1,
      offsetX: 0,
      offsetY: 0
    };

    overlay.src = CONFIG.templateUrl;

    function setStatus(text) {
      statusBadge.textContent = text;
    }

    function isFrontCamera() {
      return currentFacingMode === "user";
    }

    function updateVideoMirror() {
      const shouldMirror = CONFIG.mirrorFrontCameraPreview && isFrontCamera();
      video.classList.toggle("mirror", shouldMirror);
    }

    function updateOverlayPreview() {
      overlay.style.transform =
        `translate(${overlayState.offsetX}%, ${overlayState.offsetY}%) scale(${overlayState.scale})`;

      scaleValue.textContent = `${Math.round(overlayState.scale * 100)}%`;
      offsetXValue.textContent = `${overlayState.offsetX.toFixed(1)}%`;
      offsetYValue.textContent = `${overlayState.offsetY.toFixed(1)}%`;
    }

    function syncAdjustmentsFromInputs() {
      overlayState.scale = Number(scaleRange.value) / 100;
      overlayState.offsetX = Number(offsetXRange.value);
      overlayState.offsetY = Number(offsetYRange.value);
      updateOverlayPreview();
    }

    function resetAdjustments() {
      scaleRange.value = 100;
      offsetXRange.value = 0;
      offsetYRange.value = 0;
      syncAdjustmentsFromInputs();
    }

    async function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      setStatus("Câmera desligada");
    }

    async function startCamera() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("getUserMedia não suportado neste navegador.");
        }

        await stopCamera();

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: { ideal: currentFacingMode },
              width: { ideal: 1080 },
              height: { ideal: 1920 }
            }
          });
        } catch (e) {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: true
          });
        }

        video.srcObject = stream;

        await new Promise((resolve) => {
          if (video.readyState >= 1) {
            resolve();
          } else {
            video.onloadedmetadata = () => resolve();
          }
        });

        await video.play();
        updateVideoMirror();

        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings ? track.getSettings() : {};

        if (settings.facingMode) {
          currentFacingMode = settings.facingMode;
          updateVideoMirror();
        }

        setStatus(
          currentFacingMode === "user"
            ? "Câmera frontal"
            : "Câmera traseira"
        );
      } catch (err) {
        console.error(err);
        setStatus("Erro ao abrir câmera");
        alert(
          "Não foi possível abrir a câmera.\n\n" +
          "Verifique:\n" +
          "- permissão da câmera\n" +
          "- HTTPS ou localhost\n" +
          "- navegador compatível"
        );
      }
    }

    async function switchCamera() {
      currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
      await startCamera();
    }

    function flashEffect() {
      flash.classList.add("active");
      setTimeout(() => flash.classList.remove("active"), 140);
    }

    function drawContainImage(ctx, img, destW, destH, mirror = false) {
      const srcW = img.videoWidth || img.naturalWidth || img.width;
      const srcH = img.videoHeight || img.naturalHeight || img.height;

      if (!srcW || !srcH) {
        throw new Error("Imagem/vídeo ainda não está pronto para desenhar.");
      }

      const srcRatio = srcW / srcH;
      const destRatio = destW / destH;

      let drawW, drawH, offsetX, offsetY;

      if (srcRatio > destRatio) {
        drawW = destW;
        drawH = destW / srcRatio;
        offsetX = 0;
        offsetY = (destH - drawH) / 2;
      } else {
        drawH = destH;
        drawW = destH * srcRatio;
        offsetX = (destW - drawW) / 2;
        offsetY = 0;
      }

      if (mirror) {
        ctx.save();
        ctx.translate(destW, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
        ctx.restore();
      } else {
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
      }
    }

    function drawAdjustedOverlayContain(ctx, img, destW, destH, scale, offsetXPercent, offsetYPercent) {
      const srcW = img.naturalWidth || img.width;
      const srcH = img.naturalHeight || img.height;

      if (!srcW || !srcH) {
        throw new Error("Filtro ainda não está pronto para desenhar.");
      }

      const srcRatio = srcW / srcH;
      const destRatio = destW / destH;

      let baseW, baseH;

      if (srcRatio > destRatio) {
        baseW = destW;
        baseH = destW / srcRatio;
      } else {
        baseH = destH;
        baseW = destH * srcRatio;
      }

      const drawW = baseW * scale;
      const drawH = baseH * scale;

      const x = (destW - drawW) / 2 + (destW * offsetXPercent / 100);
      const y = (destH - drawH) / 2 + (destH * offsetYPercent / 100);

      ctx.drawImage(img, x, y, drawW, drawH);
    }

    async function ensureOverlayLoaded() {
      if (overlay.complete && overlay.naturalWidth > 0) return;

      await new Promise((resolve, reject) => {
        overlay.onload = () => resolve();
        overlay.onerror = () => reject(new Error("Falha ao carregar filtro.png"));
      });
    }

    async function capturePhoto() {
      try {
        if (!video.videoWidth || !video.videoHeight) {
          alert("A câmera ainda não está pronta.");
          return;
        }

        await ensureOverlayLoaded();
        flashEffect();

        canvas.width = CONFIG.outputWidth;
        canvas.height = CONFIG.outputHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawContainImage(
          ctx,
          video,
          CONFIG.outputWidth,
          CONFIG.outputHeight,
          CONFIG.mirrorFrontCameraCapture && isFrontCamera()
        );

        drawAdjustedOverlayContain(
          ctx,
          overlay,
          CONFIG.outputWidth,
          CONFIG.outputHeight,
          overlayState.scale,
          overlayState.offsetX,
          overlayState.offsetY
        );

        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(
            (b) => (b ? resolve(b) : reject(new Error("Falha ao gerar imagem"))),
            CONFIG.outputMimeType,
            CONFIG.outputQuality
          );
        });

        if (lastBlobUrl) {
          URL.revokeObjectURL(lastBlobUrl);
        }

        lastBlobUrl = URL.createObjectURL(blob);
        resultImage.src = lastBlobUrl;
        result.classList.add("show");
        saveBtn.disabled = false;

        result.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (err) {
        console.error(err);
        alert("Erro ao capturar a foto. Verifique se o filtro.png está no mesmo local do index.html.");
      }
    }

    function buildFileName() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, "0");
      return `${CONFIG.fileNamePrefix}-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.jpg`;
    }

    function openFallback() {
      if (!lastBlobUrl) return;
      window.open(lastBlobUrl, "_blank");
    }

    function savePhoto() {
      if (!lastBlobUrl) return;

      try {
        const a = document.createElement("a");
        a.href = lastBlobUrl;
        a.download = buildFileName();
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (err) {
        console.warn("Download direto falhou:", err);
      }

      setTimeout(() => {
        openFallback();
      }, 300);
    }

    function retakePhoto() {
      result.classList.remove("show");
      resultImage.removeAttribute("src");
      saveBtn.disabled = true;
    }

    switchBtn.addEventListener("click", switchCamera);
    captureBtn.addEventListener("click", capturePhoto);
    saveBtn.addEventListener("click", savePhoto);
    retakeBtn.addEventListener("click", retakePhoto);

    scaleRange.addEventListener("input", syncAdjustmentsFromInputs);
    offsetXRange.addEventListener("input", syncAdjustmentsFromInputs);
    offsetYRange.addEventListener("input", syncAdjustmentsFromInputs);
    resetAdjustBtn.addEventListener("click", resetAdjustments);

    window.addEventListener("beforeunload", stopCamera);

    overlay.addEventListener("error", () => {
      console.warn("Não foi possível carregar o template:", CONFIG.templateUrl);
    });

    window.addEventListener("load", async () => {
      resetAdjustments();

      if (location.protocol === "https:" || location.hostname === "localhost") {
        await startCamera();
      } else {
        setStatus("Use HTTPS para ativar a câmera");
      }
    });
  </script>
</body>
</html>
