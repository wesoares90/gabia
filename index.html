<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Camera</title>

  <style>
    :root {
      --bg: #0f0f10;
      --panel: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.75);
      --radius: 18px;
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      padding: 14px;
    }

    .camera-shell {
      position: relative;
      min-height: 54vh;
      border-radius: 24px;
      overflow: hidden;
      background: #000;
    }

    video, img, .capture-flash {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .video.mirror { transform: scaleX(-1); }

    .capture-flash {
      background: #fff;
      opacity: 0;
      transition: opacity 140ms;
    }

    .capture-flash.active { opacity: 0.85; }

    .badge {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,0.5);
      font-size: 0.85rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    .capture-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: white;
      border: none;
    }

    .result { display: none; }
    .result.show { display: block; }

    canvas { display: none; }
  </style>
</head>

<body>
<main class="app">

  <div class="camera-shell">
    <div class="badge" id="statusBadge">Câmera desligada</div>

    <video id="video" autoplay muted playsinline></video>

    <img id="overlay" src="./filtro.png"/>

    <div id="flash" class="capture-flash"></div>
  </div>

  <div class="controls">
    <div></div>

    <button id="captureBtn" class="capture-btn"></button>

    <div style="text-align:right;">
      <button id="downloadBtn" disabled>Salvar</button>
    </div>
  </div>

  <div id="result" class="result">
    <img id="resultImage"/>
  </div>

  <canvas id="canvas"></canvas>

</main>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const captureBtn = document.getElementById("captureBtn");
const downloadBtn = document.getElementById("downloadBtn");
const result = document.getElementById("result");
const resultImage = document.getElementById("resultImage");
const statusBadge = document.getElementById("statusBadge");
const flash = document.getElementById("flash");

let stream = null;
let lastBlobUrl = null;

function setStatus(text) {
  statusBadge.textContent = text;
}

async function startCamera() {
  try {
    await stopCamera();

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" },
        audio: false
      });
    } catch {
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: false
      });
    }

    video.srcObject = stream;
    await video.play();

    setStatus("Câmera ativa");
  } catch (e) {
    console.error(e);
    setStatus("Erro na câmera");
    alert("Permita acesso à câmera e use HTTPS.");
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
}

function flashEffect() {
  flash.classList.add("active");
  setTimeout(() => flash.classList.remove("active"), 120);
}

async function capturePhoto() {
  if (!video.videoWidth) return;

  flashEffect();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  ctx.drawImage(video, 0, 0);

  const blob = await new Promise(res =>
    canvas.toBlob(res, "image/jpeg", 0.95)
  );

  if (lastBlobUrl) URL.revokeObjectURL(lastBlobUrl);
  lastBlobUrl = URL.createObjectURL(blob);

  resultImage.src = lastBlobUrl;
  result.classList.add("show");
  downloadBtn.disabled = false;
}

function downloadPhoto() {
  const a = document.createElement("a");
  a.href = lastBlobUrl;
  a.download = "foto.jpg";
  a.click();
}

captureBtn.onclick = capturePhoto;
downloadBtn.onclick = downloadPhoto;

window.onload = () => {
  if (location.protocol === "https:" || location.hostname === "localhost") {
    startCamera();
  } else {
    setStatus("Use HTTPS");
  }
};
</script>

</body>
</html>
