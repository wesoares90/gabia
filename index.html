<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Wedding Camera Overlay</title>

  <style>
    :root {
      --bg: #000000;
      --panel: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.8);
      --shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Inter, system-ui, Arial, sans-serif;
    }

    body {
      color: var(--text);
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100dvh;
      background: #000;
      overflow: hidden;
    }

    .stage {
      position: absolute;
      inset: 0;
      background: #000;
      overflow: hidden;
    }

    .video,
    .overlay,
    .preview-image,
    .capture-flash {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .video,
    .overlay,
    .preview-image {
      object-fit: cover;
      background: #000;
    }

    .video {
      transform-origin: center center;
    }

    .video.mirror {
      transform: scaleX(-1);
    }

    .overlay {
      pointer-events: none;
      user-select: none;
    }

    .capture-flash {
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 140ms ease;
      z-index: 6;
    }

    .capture-flash.active {
      opacity: 0.85;
    }

    .top-ui {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding:
        calc(14px + var(--safe-top))
        calc(14px + var(--safe-right))
        14px
        calc(14px + var(--safe-left));
      pointer-events: none;
    }

    .header-card,
    .badge {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .header-card {
      padding: 12px 14px;
      max-width: min(78vw, 340px);
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.3;
    }

    .badge {
      padding: 10px 12px;
      font-size: 0.84rem;
      white-space: nowrap;
      margin-left: 12px;
    }

    .bottom-ui {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      padding:
        14px
        calc(14px + var(--safe-right))
        calc(20px + var(--safe-bottom))
        calc(14px + var(--safe-left));
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      pointer-events: none;
    }

    .bottom-ui > * {
      pointer-events: auto;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .capture-btn {
      width: 86px;
      height: 86px;
      border-radius: 50%;
      padding: 0;
      background: #fff;
      position: relative;
      box-shadow: var(--shadow);
      flex: 0 0 auto;
    }

    .capture-btn::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 3px solid #111;
    }

    .secondary {
      min-width: 120px;
    }

    .preview-screen {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: #000;
      display: none;
    }

    .preview-screen.show {
      display: block;
    }

    .preview-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 22;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding:
        calc(14px + var(--safe-top))
        calc(14px + var(--safe-right))
        14px
        calc(14px + var(--safe-left));
    }

    .preview-bottom {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 22;
      display: flex;
      justify-content: center;
      padding:
        14px
        calc(14px + var(--safe-right))
        calc(20px + var(--safe-bottom))
        calc(14px + var(--safe-left));
    }

    .hidden {
      display: none !important;
    }

    canvas {
      display: none;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage">
      <video id="video" class="video" autoplay muted playsinline></video>

      <img
        id="overlay"
        class="overlay"
        src="./filtro.png"
        alt="Filtro do casamento"
      />

      <div id="flash" class="capture-flash"></div>
    </section>

    <section class="top-ui" id="liveTopUi">
      <div class="header-card">
        <div class="title">Foto do Casamento</div>
        <div class="subtitle">Enquadramento em tela cheia no padrão Story</div>
      </div>

      <div class="badge" id="statusBadge">Câmera desligada</div>
    </section>

    <section class="bottom-ui" id="liveBottomUi">
      <button id="switchBtn" class="secondary" type="button">Trocar câmera</button>
      <button id="captureBtn" class="capture-btn" aria-label="Capturar foto"></button>
      <div style="width:120px;"></div>
    </section>

    <section id="previewScreen" class="preview-screen">
      <img id="previewImage" class="preview-image" alt="Foto final com filtro" />

      <div class="preview-top">
        <div class="badge">Foto tirada</div>
      </div>

      <div class="preview-bottom">
        <button id="saveBtn" class="secondary" disabled>Baixar</button>
      </div>
    </section>

    <canvas id="canvas"></canvas>
  </main>

  <script>
    const CONFIG = {
      templateUrl: "./filtro.png",
      preferredFacingMode: "user",
      mirrorFrontCameraPreview: true,
      mirrorFrontCameraCapture: true,
      outputMimeType: "image/jpeg",
      outputQuality: 0.95,
      fileNamePrefix: "casamento",
      outputWidth: 1080,
      outputHeight: 1920
    };

    const video = document.getElementById("video");
    const overlay = document.getElementById("overlay");
    const flash = document.getElementById("flash");
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    const statusBadge = document.getElementById("statusBadge");
    const switchBtn = document.getElementById("switchBtn");
    const captureBtn = document.getElementById("captureBtn");
    const saveBtn = document.getElementById("saveBtn");

    const previewScreen = document.getElementById("previewScreen");
    const previewImage = document.getElementById("previewImage");
    const liveTopUi = document.getElementById("liveTopUi");
    const liveBottomUi = document.getElementById("liveBottomUi");

    let stream = null;
    let currentFacingMode = CONFIG.preferredFacingMode;
    let lastBlobUrl = null;

    overlay.src = CONFIG.templateUrl;

    function setStatus(text) {
      statusBadge.textContent = text;
    }

    function isFrontCamera() {
      return currentFacingMode === "user";
    }

    function updateVideoMirror() {
      const shouldMirror = CONFIG.mirrorFrontCameraPreview && isFrontCamera();
      video.classList.toggle("mirror", shouldMirror);
    }

    async function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
      setStatus("Câmera desligada");
    }

    async function startCamera() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          throw new Error("getUserMedia não suportado neste navegador.");
        }

        await stopCamera();

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: {
              facingMode: currentFacingMode,
              width: { ideal: 1080 },
              height: { ideal: 1920 }
            }
          });
        } catch (err) {
          stream = await navigator.mediaDevices.getUserMedia({
            audio: false,
            video: true
          });
        }

        video.srcObject = stream;
        await video.play();

        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings ? track.getSettings() : {};

        if (settings.facingMode) {
          currentFacingMode = settings.facingMode;
        }

        updateVideoMirror();

        setStatus(
          currentFacingMode === "user"
            ? "Câmera frontal"
            : "Câmera traseira"
        );
      } catch (err) {
        console.error(err);
        setStatus("Erro ao abrir câmera");
        alert(
          "Não foi possível abrir a câmera.\n\n" +
          "Verifique:\n" +
          "- permissão da câmera\n" +
          "- HTTPS ou localhost\n" +
          "- navegador compatível"
        );
      }
    }

    async function switchCamera() {
      currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
      await startCamera();
    }

    function flashEffect() {
      flash.classList.add("active");
      setTimeout(() => flash.classList.remove("active"), 140);
    }

    function drawCoverImage(ctx, img, destW, destH, mirror = false) {
      const srcW = img.videoWidth || img.naturalWidth || img.width;
      const srcH = img.videoHeight || img.naturalHeight || img.height;

      if (!srcW || !srcH) {
        throw new Error("Imagem/vídeo ainda não está pronta para desenhar.");
      }

      const srcRatio = srcW / srcH;
      const destRatio = destW / destH;

      let drawW, drawH, offsetX, offsetY;

      if (srcRatio > destRatio) {
        drawH = destH;
        drawW = destH * srcRatio;
        offsetX = (destW - drawW) / 2;
        offsetY = 0;
      } else {
        drawW = destW;
        drawH = destW / srcRatio;
        offsetX = 0;
        offsetY = (destH - drawH) / 2;
      }

      if (mirror) {
        ctx.save();
        ctx.translate(destW, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
        ctx.restore();
      } else {
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
      }
    }

    async function ensureOverlayLoaded() {
      if (overlay.complete && overlay.naturalWidth > 0) return;

      await new Promise((resolve, reject) => {
        overlay.onload = () => resolve();
        overlay.onerror = () => reject(new Error("Falha ao carregar filtro.png"));
      });
    }

    function showPreview(blobUrl) {
      previewImage.src = blobUrl;
      previewScreen.classList.add("show");
      liveTopUi.classList.add("hidden");
      liveBottomUi.classList.add("hidden");
    }

    async function capturePhoto() {
      try {
        if (!video.videoWidth || !video.videoHeight) {
          alert("A câmera ainda não está pronta.");
          return;
        }

        await ensureOverlayLoaded();
        flashEffect();

        canvas.width = CONFIG.outputWidth;
        canvas.height = CONFIG.outputHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        drawCoverImage(
          ctx,
          video,
          canvas.width,
          canvas.height,
          CONFIG.mirrorFrontCameraCapture && isFrontCamera()
        );

        drawCoverImage(
          ctx,
          overlay,
          canvas.width,
          canvas.height,
          false
        );

        const blob = await new Promise((resolve, reject) => {
          canvas.toBlob(
            b => b ? resolve(b) : reject(new Error("Falha ao gerar imagem")),
            CONFIG.outputMimeType,
            CONFIG.outputQuality
          );
        });

        if (lastBlobUrl) {
          URL.revokeObjectURL(lastBlobUrl);
        }

        lastBlobUrl = URL.createObjectURL(blob);
        showPreview(lastBlobUrl);
        saveBtn.disabled = false;
      } catch (err) {
        console.error(err);
        alert("Erro ao capturar a foto. Verifique se o filtro.png está no mesmo local do index.html.");
      }
    }

    function buildFileName() {
      const now = new Date();
      const pad = n => String(n).padStart(2, "0");
      return `${CONFIG.fileNamePrefix}-${now.getFullYear()}${pad(now.getMonth() + 1)}${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}${pad(now.getSeconds())}.jpg`;
    }

    function openFallback() {
      if (!lastBlobUrl) return;
      window.open(lastBlobUrl, "_blank");
    }

    function savePhoto() {
      if (!lastBlobUrl) return;

      try {
        const a = document.createElement("a");
        a.href = lastBlobUrl;
        a.download = buildFileName();
        document.body.appendChild(a);
        a.click();
        a.remove();
      } catch (err) {
        console.warn("Download direto falhou:", err);
      }

      setTimeout(() => {
        openFallback();
      }, 300);
    }

    switchBtn.addEventListener("click", switchCamera);
    captureBtn.addEventListener("click", capturePhoto);
    saveBtn.addEventListener("click", savePhoto);

    window.addEventListener("beforeunload", stopCamera);

    overlay.addEventListener("error", () => {
      console.warn("Não foi possível carregar o template:", CONFIG.templateUrl);
    });

    window.addEventListener("load", async () => {
      if (location.protocol === "https:" || location.hostname === "localhost") {
        await startCamera();
      } else {
        setStatus("Use HTTPS para ativar a câmera");
      }
    });
  </script>
</body>
</html>
